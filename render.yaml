services:
  - type: web
    name: nosy-neighbour
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: yes
    envVars:
      - key: PORT
        value: 8000
      # Add any API keys here - never commit real values, use Render dashboard instead
      # - key: MY_API_KEY
      #   sync: false
      - key: DATAFORDELER_USERNAME
        sync: false
      - key: DATAFORDELER_PASSWORD
        sync: false
      - key: DATAFORSYNINGEN_TOKEN
        sync: false
