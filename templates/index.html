<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosy Neighbour</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,.1);
      z-index: 10;
    }

    #search-box {
      padding: 14px;
      border-bottom: 1px solid #eee;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: #2563eb; }

    #suggestions {
      position: absolute;
      left: 14px; right: 14px;
      background: #fff;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .suggestion {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover { background: #f0f6ff; }

    #results {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .empty-state {
      color: #999;
      text-align: center;
      margin-top: 60px;
      line-height: 1.8;
    }
    .empty-state strong { display: block; font-size: 16px; color: #666; margin-bottom: 8px; }

    /* ── Entry (per address) ── */
    .entry-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0 10px;
    }
    .entry-num {
      background: #2563eb;
      color: #fff;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .entry-label { flex: 1; font-weight: 600; font-size: 13px; color: #111; }
    .entry-remove {
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 20px; line-height: 1;
      padding: 0 2px; flex-shrink: 0;
    }
    .entry-remove:hover { color: #dc2626; }

    .entry-pdf {
      background: #2563eb; border: none; cursor: pointer;
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px; flex-shrink: 0;
    }
    .entry-pdf:hover { background: #1d4ed8; }
    .entry-pdf:disabled { background: #9ca3af; cursor: not-allowed; }
    .entry-divider { border: none; border-top: 2px solid #e5e7eb; margin: 8px 0; }

    .limit-notice {
      font-size: 12px; color: #92400e;
      padding: 8px 12px; background: #fef3c7;
      border-radius: 6px; margin-bottom: 10px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .card-title {
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .address-header {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .property-type {
      font-size: 13px;
      color: #6b7280;
    }

    table { width: 100%; border-collapse: collapse; }
    td { padding: 4px 0; vertical-align: top; }
    td:first-child { color: #6b7280; width: 130px; }
    td:last-child { font-weight: 500; }

    /* ── Mortgage items ── */
    .mortgage {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .mortgage:last-child { margin-bottom: 0; }
    .mortgage-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .mortgage-type { font-weight: 600; }
    .mortgage-amount { font-weight: 700; color: #111; }
    .mortgage-meta { font-size: 12px; color: #6b7280; }

    .loan-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }
    .badge-certain  { background: #dcfce7; color: #166534; }
    .badge-close    { background: #fef9c3; color: #854d0e; }
    .badge-uncertain { background: #fee2e2; color: #991b1b; }

    .candidates {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
    }
    .candidate { display: flex; justify-content: space-between; padding: 2px 0; }
    .candidate.best { color: #111; font-weight: 600; }
    .delta-bar-wrap { width: 80px; background: #f3f4f6; border-radius: 3px; height: 6px; margin-top: 5px; overflow: hidden; }
    .delta-bar { height: 100%; background: #2563eb; border-radius: 3px; }

    .assumption-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .assumption-tab { flex: 1; padding: 4px 6px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 11px; cursor: pointer; background: #f9fafb; color: #374151; text-align: center; }
    .assumption-tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* ── Valuation chart ── */
    .valuation-chart-wrap { position: relative; height: 160px; margin-top: 8px; }

    /* ── Transport ── */
    .stop-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .stop-item:last-child { border-bottom: none; }
    .stop-name { color: #111; font-weight: 500; }
    .stop-dist { color: #6b7280; font-size: 11px; }

    /* ── Easements ── */
    .easement { font-size: 12px; color: #374151; padding: 3px 0; border-bottom: 1px solid #f3f4f6; }
    .easement:last-child { border-bottom: none; }

    /* ── Spinner ── */
    .spinner {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    /* ── Map ── */
    #map { flex: 1; cursor: crosshair; }

    /* ── Map pin ── */
    .map-pin {
      background: #2563eb;
      color: #fff;
      border-radius: 50%;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    /* ── Neighbourhood stats ── */
    .nabo-bar-wrap { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .nabo-bar-label { width: 42px; font-size: 11px; color: #6b7280; text-align: right; flex-shrink: 0; }
    .nabo-bar-track { flex: 1; height: 14px; background: #f3f4f6; border-radius: 3px; position: relative; overflow: hidden; }
    .nabo-bar-fill { height: 100%; border-radius: 3px; }
    .nabo-bar-fill.kommune { background: #2563eb; }
    .nabo-bar-fill.land { background: #e5e7eb; position: absolute; top: 0; left: 0; height: 100%; }
    .nabo-bar-pct { width: 38px; font-size: 11px; color: #374151; font-weight: 500; }
    .nabo-legend { display: flex; gap: 12px; font-size: 11px; color: #6b7280; margin-top: 6px; }
    .nabo-legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
    .nabo-loading { font-size: 12px; color: #6b7280; padding: 8px 0; }
    .nabo-income-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f3f4f6; }
    .nabo-income-row:last-child { border-bottom: none; }
    .nabo-income-label { color: #6b7280; font-size: 12px; }
    .nabo-income-vals { font-size: 12px; font-weight: 500; }
    .nabo-income-diff { font-size: 11px; margin-left: 4px; }
    .nabo-income-diff.pos { color: #166534; }
    .nabo-income-diff.neg { color: #dc2626; }

    /* ── Leaflet popup ── */
    .leaflet-popup-content { min-width: 180px; font-size: 13px; }
    .popup-address { font-weight: 700; margin-bottom: 6px; }
    .popup-owners { color: #374151; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="search-box">
    <input id="search-input" type="text" placeholder="Søg adresse… (fx Stålhøjen 24 Risskov)" autocomplete="off"/>
    <div id="suggestions" style="display:none"></div>
  </div>
  <div id="results">
    <div class="empty-state">
      <strong>Nosy Neighbour</strong>
      Søg på en adresse eller klik på kortet.<br>Op til 10 adresser ad gangen.
    </div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map('map').setView([56.0, 10.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// entries: [{ label, lat, lng, data, error, loading, marker }]
const entries = [];

let loanAssumption = 'deferred_10y';

function setLoanAssumption(type) {
  loanAssumption = type;
  renderSidebar();
}

function loanAgeMonths(alias) {
  const datePart = alias ? alias.split('-')[0] : null;
  if (!datePart) return null;
  try {
    const [d, m, y] = datePart.split('.').map(Number);
    const reg = new Date(y, m - 1, d);
    const now = new Date();
    return (now.getFullYear() - reg.getFullYear()) * 12 + (now.getMonth() - reg.getMonth());
  } catch { return null; }
}

function outstandingBalance(principal, annualRatePct, monthsElapsed, type) {
  if (monthsElapsed === null || monthsElapsed <= 0) return principal;
  const r = annualRatePct / 100 / 12;

  function annuityRemaining(P, r, n, k) {
    k = Math.min(k, n);
    if (k >= n) return 0;
    if (r === 0) return P * (n - k) / n;
    return P * (Math.pow(1 + r, n) - Math.pow(1 + r, k)) / (Math.pow(1 + r, n) - 1);
  }

  if (type === 'interest_only') return principal;
  if (type === 'repayment')     return annuityRemaining(principal, r, 360, monthsElapsed);
  if (type === 'deferred_10y') {
    if (monthsElapsed <= 120) return principal;
    return annuityRemaining(principal, r, 240, monthsElapsed - 120);
  }
  return principal;
}

function numberedIcon(n) {
  return L.divIcon({
    html: `<div class="map-pin">${n}</div>`,
    className: '',
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -14],
  });
}

map.on('click', async e => {
  if (entries.length >= 10) return;
  const { lat, lng } = e.latlng;
  const res = await fetch(`/api/reverse?lat=${lat}&lng=${lng}`);
  if (!res.ok) return;
  const addr = await res.json();
  input.value = '';
  addAddress(addr.label, addr.lat, addr.lng);
});

// ── Autocomplete ───────────────────────────────────────────────────────────
const input = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer;
let currentSuggestions = [];

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = input.value.trim();
  if (q.length < 3) { hideSuggestions(); return; }
  debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSuggestions();
  if (e.key === 'Enter' && currentSuggestions.length > 0) {
    selectSuggestion(currentSuggestions[0]);
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-box')) hideSuggestions();
});

async function fetchSuggestions(q) {
  const res = await fetch(`/api/autocomplete?q=${encodeURIComponent(q)}`);
  currentSuggestions = await res.json();
  if (!currentSuggestions.length) { hideSuggestions(); return; }
  suggestionsEl.innerHTML = currentSuggestions
    .map((s, i) => `<div class="suggestion" data-i="${i}">${s.label}</div>`)
    .join('');
  suggestionsEl.style.display = 'block';
  suggestionsEl.querySelectorAll('.suggestion').forEach(el => {
    el.addEventListener('click', () => selectSuggestion(currentSuggestions[+el.dataset.i]));
  });
}

function hideSuggestions() {
  suggestionsEl.style.display = 'none';
}

function selectSuggestion(s) {
  input.value = '';
  hideSuggestions();
  if (entries.length >= 10) return;
  map.setView([s.lat, s.lng], 16);
  addAddress(s.label, s.lat, s.lng);
}

// ── Multi-address management ───────────────────────────────────────────────
async function addAddress(label, lat, lng) {
  const idx = entries.length;
  const marker = L.marker([lat, lng], { icon: numberedIcon(idx + 1) }).addTo(map);
  marker.on('click', () => scrollToEntry(idx));

  const entry = { label, lat, lng, data: null, valuations: null, error: null, loading: true, marker };
  entries.push(entry);
  renderSidebar();

  try {
    const res = await fetch(`/api/lookup?q=${encodeURIComponent(label)}`);
    if (res.ok) {
      entry.data = await res.json();
      const owners = (entry.data.ejere || []).map(e => `${e.navn} (${e.andel})`).join('<br>');
      marker.bindPopup(`<div class="popup-address">${entry.data.adresse}</div><div class="popup-owners">${owners}</div>`);
    } else {
      entry.error = (await res.json()).detail || 'Fejl';
    }
  } catch {
    entry.error = 'Netværksfejl';
  }
  entry.loading = false;
  renderSidebar();
  scrollToEntry(idx);

  // Fetch historical valuations and transport in background
  if (entry.data) {
    const [vRes, tRes, cRes] = await Promise.allSettled([
      fetch(`/api/valuations?q=${encodeURIComponent(label)}`),
      fetch(`/api/transport?lat=${lat}&lng=${lng}`),
      fetch(`/api/climate?lat=${lat}&lng=${lng}`),
    ]);
    if (vRes.status === 'fulfilled' && vRes.value.ok) {
      entry.valuations = await vRes.value.json();
    }
    if (cRes.status === 'fulfilled' && cRes.value.ok) {
      entry.climate = await cRes.value.json();
    }
    if (tRes.status === 'fulfilled' && tRes.value.ok) {
      entry.transport = await tRes.value.json();
      // Add stop markers to map
      entry.stopMarkers = (entry.transport.stops || []).map(s => {
        const m = L.circleMarker([s.lat, s.lng], {
          radius: 5, fillColor: '#f59e0b', color: '#92400e',
          weight: 1, fillOpacity: 0.8,
        }).addTo(map);
        m.bindTooltip(s.name, { direction: 'top', offset: [0, -6] });
        return m;
      });
    }
    renderSidebar();
  }
}

function removeEntry(i) {
  map.removeLayer(entries[i].marker);
  (entries[i].stopMarkers || []).forEach(m => map.removeLayer(m));
  entries.splice(i, 1);
  entries.forEach((e, j) => {
    e.marker.setIcon(numberedIcon(j + 1));
    e.marker.off('click');
    e.marker.on('click', () => scrollToEntry(j));
  });
  renderSidebar();
}

function scrollToEntry(idx) {
  const el = document.getElementById(`entry-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('results');
  if (entries.length === 0) {
    el.innerHTML = `<div class="empty-state"><strong>Nosy Neighbour</strong>Søg på en adresse eller klik på kortet.<br>Op til 10 adresser ad gangen.</div>`;
    return;
  }

  el.innerHTML = '';

  if (entries.length >= 10) {
    el.appendChild(html('<div class="limit-notice">Maks. 10 adresser nået — fjern en for at tilføje nye.</div>'));
  }

  entries.forEach((entry, i) => {
    const section = document.createElement('div');
    section.id = `entry-${i}`;

    section.appendChild(html(`
      <div class="entry-header">
        <span class="entry-num">${i + 1}</span>
        <span class="entry-label">${entry.label}</span>
        ${entry.data ? `<button class="entry-pdf" onclick="downloadPdf('${entry.label.replace(/'/g, "\\'")}')" title="Download PDF">PDF</button>` : ''}
        <button class="entry-remove" onclick="removeEntry(${i})" title="Fjern">×</button>
      </div>
    `));

    if (entry.loading) {
      section.appendChild(html('<div class="spinner">Henter oplysninger…</div>'));
    } else if (entry.error) {
      section.appendChild(html(`<div style="color:#dc2626;padding:4px 0 10px">${entry.error}</div>`));
    } else if (entry.data) {
      renderEntryCards(section, entry.data, entry.valuations, entry.transport, entry.climate, i);
    }

    el.appendChild(section);
    if (i < entries.length - 1) {
      el.appendChild(html('<hr class="entry-divider">'));
    }
  });
}

function renderEntryCards(container, d, valuations, transport, climate, entryIdx) {
  container.appendChild(html(`
    <div class="card">
      <div class="address-header">${d.adresse}</div>
      <div class="property-type">${d.ejendomstype}</div>
    </div>
  `));

  if (d.matrikler?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Matrikler</div>
        <table>${d.matrikler.map(m => `
          <tr><td>${m.matrikelnummer}</td><td>${m.landsejerlavnavn}</td></tr>
        `).join('')}</table>
      </div>
    `));
  }

  if (d.vurdering) {
    const v = d.vurdering;
    const totalDebt = (d.haeftelser || []).reduce((sum, h) => {
      const principal = parseKr(h.hovedstol);
      const rate = parseFloat(h.rente) || 0;
      const months = loanAgeMonths(h.alias);
      const isRealkredit = ['Realkreditpantebrev', 'Afgiftspantebrev'].includes(h.haeftelsestype);
      if (isRealkredit && months !== null && rate > 0) {
        return sum + outstandingBalance(principal, rate, months, loanAssumption);
      }
      return sum + principal;
    }, 0);
    const frivaerdi = v.ejendomsvaerdi - totalDebt;
    const frivaerdiPct = v.ejendomsvaerdi > 0 ? Math.round(frivaerdi / v.ejendomsvaerdi * 100) : null;
    const frivaerdiColor = frivaerdi < 0 ? '#dc2626' : '#166534';
    const assumptionLabels = { interest_only: 'Afdragsfri', deferred_10y: '10 år afdragsfri', repayment: 'Med afdrag' };
    const debtRow = totalDebt > 0 ? `
      <tr><td colspan="2">
        <div class="assumption-tabs">
          ${Object.entries(assumptionLabels).map(([k, lbl]) => `<div class="assumption-tab${loanAssumption === k ? ' active' : ''}" onclick="setLoanAssumption('${k}')">${lbl}</div>`).join('')}
        </div>
      </td></tr>
      <tr><td>Samlet pant (est.)</td><td>${fmt(Math.round(totalDebt))} kr.</td></tr>
      <tr><td>Friværdi (est.)</td><td style="color:${frivaerdiColor};font-weight:700">${fmt(Math.round(frivaerdi))} kr.${frivaerdiPct !== null ? ` <span style="color:#6b7280;font-weight:400">(${frivaerdiPct}%)</span>` : ''}</td></tr>
    ` : '';
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Vurdering (${v.vurderingsdato})</div>
        <table>
          <tr><td>Ejendomsværdi</td><td>${fmt(v.ejendomsvaerdi)} kr.</td></tr>
          <tr><td>Grundværdi</td><td>${fmt(v.grundvaerdi)} kr.</td></tr>
          <tr><td>Kommune</td><td>${v.kommune}</td></tr>
          ${debtRow}
        </table>
      </div>
    `));
  }

  if (d.ejere?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Ejere</div>
        <table>${d.ejere.map(e => `
          <tr><td>${e.andel}</td><td>${e.navn}</td></tr>
        `).join('')}</table>
      </div>
    `));
  }

  if (d.haeftelser?.length) {
    const card = html('<div class="card"><div class="card-title">Hæftelser</div></div>');
    d.haeftelser.forEach(h => card.appendChild(renderMortgage(h)));
    container.appendChild(card);
  }

  if (d.servitutter?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Servitutter</div>
        ${d.servitutter.map(s => `<div class="easement">[${s.prioritet}] ${s.tekst}</div>`).join('')}
      </div>
    `));
  }

  // Valuation history chart
  if (valuations && valuations.history && valuations.history.length > 1) {
    const cutoff = new Date().getFullYear() - 25;
    const filtered = valuations.history.filter(h => h.year >= cutoff);
    const labels = filtered.map(h => h.year);
    const chartCard = html(`
      <div class="card">
        <div class="card-title">Pristrend</div>
        <div class="valuation-chart-wrap"><canvas id="vchart-${entryIdx}"></canvas></div>
        ${valuations.kilde ? `<div style="font-size:10px;color:#9ca3af;margin-top:4px">Kilde: ${valuations.kilde} — ${valuations.region || ''}</div>` : ''}
      </div>
    `);
    container.appendChild(chartCard);
    setTimeout(() => {
      const canvas = document.getElementById(`vchart-${entryIdx}`);
      if (!canvas) return;
      new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Ejendomsværdi (est.)',
              data: filtered.map(h => h.ejendomsvaerdi),
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37,99,235,0.08)',
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 1.5,
            },
            {
              label: 'Grundværdi (est.)',
              data: filtered.map(h => h.grundvaerdi),
              borderColor: '#16a34a',
              backgroundColor: 'rgba(22,163,74,0.06)',
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 1.5,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} kr.` } },
          },
          scales: {
            y: { ticks: { font: { size: 10 }, callback: v => v >= 1000000 ? (v/1000000).toFixed(1) + ' mio' : fmt(v) } },
            x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
          },
        },
      });
    }, 50);
  }

  // Transport stops
  if (transport && transport.stops && transport.stops.length > 0) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Offentlig transport</div>
        ${transport.stops.map(s => `
          <div class="stop-item">
            <span class="stop-name">${s.name}</span>
            <span class="stop-dist">${s.distance} m</span>
          </div>
        `).join('')}
      </div>
    `));
  }

  // Climate data
  if (climate && climate.parameters && Object.keys(climate.parameters).length > 0) {
    const labels = {
      mean_temp: ['Gns. temperatur', '°C'],
      mean_daily_max_temp: ['Gns. daglig maks.', '°C'],
      mean_daily_min_temp: ['Gns. daglig min.', '°C'],
      acc_precip: ['Nedbør (år)', 'mm'],
      mean_wind_speed: ['Gns. vindstyrke', 'm/s'],
      bright_sunshine: ['Solskinstimer (år)', 'timer'],
    };
    const latest = {};
    for (const [key, vals] of Object.entries(climate.parameters)) {
      if (vals.length > 0) latest[key] = vals[vals.length - 1];
    }
    const rows = Object.entries(latest)
      .filter(([k]) => labels[k])
      .map(([k, v]) => `<tr><td>${labels[k][0]}</td><td>${v.value} ${labels[k][1]} (${v.year})</td></tr>`)
      .join('');
    if (rows) {
      container.appendChild(html(`
        <div class="card">
          <div class="card-title">Klima — ${climate.kommune || ''}</div>
          <table>${rows}</table>
        </div>
      `));
    }
  }

  // Neighbourhood statistics (async — loads after initial render)
  if (d.vurdering?.kommune) {
    const naboCard = html(`
      <div class="card">
        <div class="card-title">Nabostatistik — ${d.vurdering.kommune}</div>
        <div class="nabo-loading">Henter DST-data…</div>
      </div>
    `);
    container.appendChild(naboCard);
    fetchNeighbourhoodData(d.vurdering.kommune, naboCard);
  }
}

function renderMortgage(h) {
  const creditors = (h.kreditorer || []).join(', ');
  const isVariable = h.fastvariabel === 'variabel';
  const regDate = h.alias ? h.alias.split('-')[0] : null;
  const lti = h.loan_type_info;

  let badgeHtml = '';
  let candidatesHtml = '';

  if (lti && isVariable) {
    if (lti.source === 'isin') {
      badgeHtml = `<span class="loan-type-badge badge-certain">${lti.loan_type} (ISIN)</span>`;
    } else if (lti.source === 'estimated') {
      if (lti.uncertain) {
        badgeHtml = `<span class="loan-type-badge badge-uncertain">Usikker (lav rente — ældre lån?)</span>`;
      } else {
        const cls = lti.close_to?.length ? 'badge-close' : 'badge-certain';
        const closeStr = lti.close_to?.length ? ` — tæt på ${lti.close_to.join(', ')}` : '';
        badgeHtml = `<span class="loan-type-badge ${cls}">${lti.loan_type}${closeStr}</span>`;
      }

      if (lti.candidates?.length) {
        const maxDelta = Math.max(...lti.candidates.map(c => c.delta));
        candidatesHtml = `<div class="candidates">${lti.candidates.map((c, i) => `
          <div class="candidate ${i === 0 ? 'best' : ''}">
            <span>${c.name}</span>
            <span>Δ ${c.delta.toFixed(4)}%</span>
          </div>
          <div class="delta-bar-wrap"><div class="delta-bar" style="width:${maxDelta > 0 ? Math.round((1 - c.delta / maxDelta) * 100) : 100}%"></div></div>
        `).join('')}</div>`;
      }
    }
  }

  return html(`
    <div class="mortgage">
      <div class="mortgage-header">
        <span class="mortgage-type">[${h.prioritet}] ${h.haeftelsestype}</span>
        <span class="mortgage-amount">${h.hovedstol}</span>
      </div>
      <div class="mortgage-meta">
        ${h.rente}% · ${isVariable ? 'variabel' : 'fast'}
        ${creditors ? ' · ' + creditors : ''}
        ${regDate ? ' · ' + regDate : ''}
      </div>
      ${badgeHtml}
      ${candidatesHtml}
    </div>
  `);
}

async function downloadPdf(label) {
  const url = `/api/report?q=${encodeURIComponent(label)}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function fmt(n) {
  return n.toLocaleString('da-DK');
}

function parseKr(s) {
  // "1.200.000 kr." → 1200000 (Danish thousands separator is '.')
  return parseInt(String(s || '').replace(/\./g, '').replace(/\s*kr\.?/i, '').trim(), 10) || 0;
}

function html(str) {
  const t = document.createElement('template');
  t.innerHTML = str.trim();
  return t.content.firstChild;
}

// ── Neighbourhood stats ─────────────────────────────────────────────────────
const _naboCache = {};

async function fetchNeighbourhoodData(kommune, cardEl) {
  if (_naboCache[kommune]) {
    renderNeighbourhoodCard(_naboCache[kommune], cardEl);
    return;
  }
  try {
    const res = await fetch(`/api/neighbourhood?kommune=${encodeURIComponent(kommune)}`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    _naboCache[kommune] = data;
    renderNeighbourhoodCard(data, cardEl);
  } catch {
    cardEl.querySelector('.nabo-loading').textContent = 'Kunne ikke hente nabostatistik.';
  }
}

function renderNeighbourhoodCard(data, cardEl) {
  const loading = cardEl.querySelector('.nabo-loading');
  if (loading) loading.remove();

  let content = '';

  if (data.befolkning) {
    const bef = data.befolkning;
    content += `<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Befolkning: ${fmt(bef.total)} (${bef.kvartal})</div>`;
    for (const g of bef.aldersgrupper) {
      content += `
        <div class="nabo-bar-wrap">
          <span class="nabo-bar-label">${g.gruppe}</span>
          <div class="nabo-bar-track">
            <div class="nabo-bar-fill land" style="width:${g.pct_land}%"></div>
            <div class="nabo-bar-fill kommune" style="width:${g.pct}%"></div>
          </div>
          <span class="nabo-bar-pct">${g.pct}%</span>
        </div>`;
    }
    content += `<div class="nabo-legend">
      <span><span class="nabo-legend-dot" style="background:#2563eb"></span>Kommune</span>
      <span><span class="nabo-legend-dot" style="background:#e5e7eb"></span>Hele landet</span>
    </div></div>`;
  }

  if (data.indkomst) {
    const ink = data.indkomst;
    content += `<div><div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Indkomst pr. person (${ink.aar})</div>`;
    for (const p of ink.poster) {
      const diff = p.land_kr ? p.kommune_kr - p.land_kr : null;
      const diffCls = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
      const diffStr = diff !== null ? `<span class="nabo-income-diff ${diffCls}">${diff > 0 ? '+' : ''}${fmt(Math.round(diff))} kr.</span>` : '';
      content += `
        <div class="nabo-income-row">
          <span class="nabo-income-label">${p.label}</span>
          <span class="nabo-income-vals">${fmt(Math.round(p.kommune_kr))} kr.${diffStr}</span>
        </div>`;
    }
    content += `<div class="nabo-legend" style="margin-top:4px">Difference = kommune vs. landsgennemsnit</div></div>`;
  }

  const wrapper = html(`<div>${content}</div>`);
  cardEl.appendChild(wrapper);
}
</script>
